jobs:
    -
        kernel_include_regex: ".*fmha_fwd_d64_bf16_msk.*"
        kernel_exclude_regex:
        kernel_iteration_range: "[1, [3-4]]"
        output_file: out
        output_directory: profile_d64_native
        output_format: [json, csv, pftrace]
        truncate_kernels: true
        sys_trace: true
        advanced_thread_trace: true
        att_target_cu: 1
        att_shader_engine_mask: "0xf"
        att_simd_select: "0xf"
        att_buffer_size: "0x6000000"
    -
        pmc: [SQ_WAVES, FETCH_SIZE]
